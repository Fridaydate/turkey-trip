<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>튀르키예 여행 플래너 🇹🇷</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
  :root {
    --color-bg: #ffffff;
    --color-bg-secondary: #f7f7f5;
    --color-bg-tertiary: #f0eeea;
    --color-text-primary: #1a1a1a;
    --color-text-secondary: #6b6b6b;
    --color-text-tertiary: #a0a0a0;
    --color-text-info: #185FA5;
    --color-border: rgba(0,0,0,0.10);
    --color-border-md: rgba(0,0,0,0.10);
    --radius-md: 12px;
    --radius-lg: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --color-bg: #1c1c1e;
      --color-bg-secondary: #2c2c2e;
      --color-bg-tertiary: #3a3a3c;
      --color-text-primary: #f5f5f5;
      --color-text-secondary: #aeaeb2;
      --color-text-tertiary: #636366;
      --color-text-info: #64a8e8;
      --color-border: rgba(255,255,255,0.10);
      --color-border-md: rgba(255,255,255,0.10);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: #F7FAFE; color: var(--color-text-primary); min-height: 100vh; padding: 2rem 1.25rem; }
  .container { max-width: 760px; margin: 0 auto; }
  .page-header { padding: 2.5rem 0 1.75rem; }
  .page-icon { font-size: 64px; line-height: 1; margin-bottom: 14px; display: block; }
  .page-title { font-size: 38px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.15; display: flex; justify-content: space-between; align-items: baseline; }
  #dday-display { font-weight: 700; letter-spacing: -0.03em; }
  #dday-display.before { color: #000000; }
  #dday-display.ongoing { color: #000000; }
  #dday-display.after { color: #000000; }

  .card { background: var(--color-bg); border: 0.5px solid var(--color-border); border-radius: var(--radius-lg); margin-bottom: 0.7rem; overflow: hidden; }
  #loading-screen { position: fixed; inset: 0; background: #F7FAFE; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 999; font-size: 17px; color: var(--color-text-secondary); }
  #loading-screen .spin { width: 28px; height: 28px; border: 3px solid rgba(34,115,255,0.2); border-top-color: #2273FF; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #firebase-error { background: #FCEBEB; color: #A32D2D; font-size: 15px; padding: 12px 20px; border-radius: var(--radius-md); margin-bottom: 1rem; display: none; }

  .week-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 22px; border-bottom: 0.5px solid var(--color-border); }
  .week-title { font-size: 17px; font-weight: 500; }
  .week-nav button { background: none; border: 0.5px solid var(--color-border-md); border-radius: var(--radius-md); padding: 4px 8px; cursor: pointer; color: var(--color-text-secondary); font-size: 17px; margin-left: 6px; font-family: var(--font); line-height: 1; }
  .week-nav button:hover { background: rgba(0,0,0,0.02); }
  .week-nav button:disabled { opacity: 0.3; cursor: default; }

  .cal-week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 12px 14px; }
  .day-cell { border: 0.5px solid var(--color-border); border-radius: var(--radius-lg); padding: 10px 8px; cursor: pointer; min-height: 62px; background: var(--color-bg); transition: border-color 0.12s, background 0.12s; }
  .day-cell:hover { background: rgba(0,0,0,0.02); }
  .day-cell.active { border: 0.5px solid var(--color-border); background: #F1F6FB; }
  .day-cell.other-month { opacity: 0.3; cursor: default; pointer-events: none; }
  .day-dow { font-size: 12px; color: var(--color-text-tertiary); margin-bottom: 4px; }
  .day-num { font-size: 15px; font-weight: 500; margin-bottom: 5px; }
  .city-pill { font-size: 11px; font-weight: 500; border-radius: 4px; padding: 3px 7px; display: inline-block; line-height: 1.5; }
  .pill-istanbul { background: #EEEDFE; color: #3C3489; }
  .pill-cappadocia { background: #FAECE7; color: #712B13; }
  .pill-antalya { background: #E1F5EE; color: #085041; }
  .task-count { font-size: 12px; color: var(--color-text-tertiary); margin-top: 4px; }
  .flight-note { font-size: 11px; color: var(--color-text-secondary); margin-top: 3px; border-top: 0.5px solid var(--color-border); padding-top: 3px; }

  .detail-header { padding: 14px 26px; }
  .detail-title { font-size: 18px; font-weight: 500; }
  .detail-sub { font-size: 14px; color: #6b6b6b; margin-top: 2px; }
  .detail-body { padding: 16px 26px; }
  .no-day { text-align: center; padding: 40px 20px; color: var(--color-text-tertiary); font-size: 16px; }
  .no-day i { font-size: 28px; display: block; margin: 0 auto 8px; }

  .task-list { margin-bottom: 12px; }
  .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 14px 20px; border: 0.5px solid var(--color-border); border-radius: var(--radius-md); margin-bottom: 6px; background: var(--color-bg); cursor: default; }
  .task-item.dragging { opacity: 0.4; }
  .task-item.drag-over { border-color: #2273FF; border-style: dashed; }
  .drag-handle { color: var(--color-text-tertiary); font-size: 16px; cursor: grab; padding-top: 2px; flex-shrink: 0; }
  .task-tag-badge { font-size: 11px; border-radius: 4px; padding: 3px 9px; display: inline-block; margin-bottom: 4px; font-weight: 500; }
  .task-name-text { font-size: 16px; line-height: 1.4; font-weight: 500; }
  .no-task-empty { text-align: center; padding: 10px 20px 32px; color: var(--color-text-tertiary); font-size: 16px; }
  .no-task-empty i { font-size: 28px; display: block; margin: 0 auto 8px; }
  .add-task-cta-btn { display: block; width: 100%; padding: 9px; font-size: 15px; font-weight: 400; color: var(--color-text-secondary); background: rgba(0,0,0,0.02); border: none; border-radius: var(--radius-md); cursor: pointer; font-family: var(--font); text-align: center; margin-bottom: 16px; }
  .add-task-cta-btn:hover { background: rgba(0,0,0,0.02); }
  .task-desc-text { font-size: 14px; color: #6b6b6b; line-height: 1.5; margin-top: 3px; white-space: pre-wrap; }
  .task-link { font-size: 14px; color: #6b6b6b; text-decoration: none; display: block; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-meta { font-size: 14px; color: #6b6b6b; margin-top: 2px; }
  .cost-text { font-size: 14px; color: #6b6b6b; margin-top: 3px; }
  .map-text { font-size: 14px; color: #6b6b6b; margin-top: 3px; text-decoration: none; display: inline-block; }
  .settlement-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 0.5px solid var(--color-border); gap: 8px; }
  .settlement-item:last-child { border-bottom: none; }
  .settlement-item.last { border-bottom: none; }
  .settlement-item.unchecked { opacity: 0.38; }
  .settlement-check { width: 16px; height: 16px; cursor: pointer; accent-color: #2273FF; flex-shrink: 0; }
  .settlement-label { font-size: 16px; flex: 1; min-width: 0; }
  .settlement-split-btn { flex-shrink: 0; border: 0.5px solid var(--color-border); border-radius: 6px; padding: 3px 7px; font-size: 13px; font-weight: 600; cursor: pointer; background: none; font-family: var(--font); color: var(--color-text-tertiary); }
  .settlement-split-btn.on { background: #2273FF; color: #fff; border-color: #2273FF; }
  .settlement-cost { font-size: 15px; font-weight: 500; color: #993C1D; flex-shrink: 0; min-width: 80px; text-align: right; }
  .settlement-total { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 0; margin-top: 4px; border-top: 1px solid var(--color-border); }
  .settlement-total-label { font-size: 16px; font-weight: 600; }
  .settlement-total-amount { font-size: 18px; font-weight: 700; color: #993C1D; }
  .settlement-empty { text-align: center; padding: 20px; color: var(--color-text-tertiary); font-size: 15px; }
  .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--color-border); }
  .todo-item:last-child { border-bottom: none; }
  .todo-item.done .todo-title { text-decoration: line-through; color: var(--color-text-tertiary); }
  .todo-item.done { opacity: 0.5; }
  .todo-check { width: 16px; height: 16px; cursor: pointer; accent-color: #2273FF; flex-shrink: 0; }
  .todo-title { font-size: 16px; flex: 1; min-width: 0; }
  .todo-person-tag { font-size: 11px; font-weight: 600; border-radius: 10px; padding: 3px 10px; flex-shrink: 0; }
  .todo-person-yeseul { background: #FBEAF0; color: #72243E; }
  .todo-person-jungho  { background: #E6F1FB; color: #0C447C; }
  .todo-empty { text-align: center; padding: 20px; color: var(--color-text-tertiary); font-size: 15px; }
  .task-actions { display: flex; gap: 2px; flex-shrink: 0; padding-top: 1px; }
  .icon-btn { background: none; border: none; cursor: pointer; color: var(--color-text-tertiary); padding: 4px; line-height: 1; border-radius: 4px; font-size: 16px; }
  .icon-btn.edit:hover { color: #2273FF; background: rgba(0,0,0,0.02); }
  .icon-btn.del:hover { color: #A32D2D; background: rgba(0,0,0,0.02); }

  .add-more-btn { width: 100%; background: rgba(0,0,0,0.02); border: none; border-radius: var(--radius-md); padding: 9px; font-size: 15px; color: var(--color-text-secondary); cursor: pointer; margin-bottom: 16px; font-family: var(--font); }
  .add-more-btn:hover { background: rgba(0,0,0,0.02); }

  .add-section { border-top: 0.5px solid var(--color-border); padding-top: 16px; }
  .form-section-title { font-size: 15px; font-weight: 500; margin-bottom: 12px; }
  .field-label { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 5px; }
  .field-required { color: #993C1D; }
  .field-opt { color: var(--color-text-tertiary); font-weight: 400; }

  input[type="text"], input[type="url"] {
    width: 100%; font-size: 15px; padding: 8px 12px; border: 0.5px solid var(--color-border-md);
    border-radius: var(--radius-md); background: var(--color-bg); color: var(--color-text-primary);
    font-family: var(--font); outline: none; margin-bottom: 14px;
  }
  input[type="text"]:focus, input[type="url"]:focus { border-color: #2273FF; box-shadow: 0 0 0 2px rgba(34,115,255,0.12); }
  input::placeholder { color: var(--color-text-tertiary); }

  .desc-textarea {
    width: 100%; font-size: 15px; resize: vertical; min-height: 76px; padding: 8px 12px;
    border: 0.5px solid var(--color-border-md); border-radius: var(--radius-md);
    background: var(--color-bg); color: var(--color-text-primary); font-family: var(--font);
    line-height: 1.6; margin-bottom: 14px; outline: none;
  }
  .desc-textarea:focus { border-color: #2273FF; box-shadow: 0 0 0 2px rgba(34,115,255,0.12); }
  .desc-textarea::placeholder { color: var(--color-text-tertiary); }

  .tags-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag-btn { border: none; border-radius: 20px; padding: 5px 13px; font-size: 14px; cursor: pointer; background: rgba(0,0,0,0.04); color: var(--color-text-secondary); font-family: var(--font); transition: all 0.12s; }
  .tag-btn:hover { background: rgba(0,0,0,0.02); }
  .tag-btn.sel-food     { border-color: #993C1D; background: #D85A30; color: #fff; font-weight: 500; }
  .tag-btn.sel-cafe     { border-color: #854F0B; background: #BA7517; color: #fff; font-weight: 500; }
  .tag-btn.sel-shopping { border-color: #993556; background: #D4537E; color: #fff; font-weight: 500; }
  .tag-btn.sel-tour     { border-color: #2273FF; background: #7F77DD; color: #fff; font-weight: 500; }
  .tag-btn.sel-activity { border-color: #3B6D11; background: #639922; color: #fff; font-weight: 500; }
  .tag-btn.sel-move     { border-color: #185FA5; background: #378ADD; color: #fff; font-weight: 500; }
  .tag-btn.sel-hotel    { border-color: #0F6E56; background: #1D9E75; color: #fff; font-weight: 500; }
  .tag-btn.sel-etc      { border-color: #5F5E5A; background: #888780; color: #fff; font-weight: 500; }

  .optional-row { display: flex; gap: 8px; margin-bottom: 0; }
  .opt-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; border: 0.5px dashed var(--color-border-md); border-radius: var(--radius-md); padding: 9px 12px; cursor: pointer; font-size: 14px; color: var(--color-text-secondary); background: none; font-family: var(--font); }
  .opt-btn:hover { background: rgba(0,0,0,0.02); }
  .opt-btn.selected { border: 0.5px solid #AFA9EC; background: #EEEDFE; color: #3C3489; }
  .optional-fields { background: var(--color-bg-secondary); border-radius: var(--radius-md); padding: 14px 16px; margin-top: 8px; }
  .optional-fields input { margin-bottom: 0; }
  .pdf-upload-label { display: flex; align-items: center; gap: 8px; border: 0.5px dashed var(--color-border-md); border-radius: var(--radius-md); padding: 10px 18px; cursor: pointer; font-size: 15px; color: var(--color-text-secondary); background: var(--color-bg); }
  .pdf-upload-label:hover { background: rgba(0,0,0,0.02); }
  .pdf-upload-label input { display: none; }
  .pdf-attached { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--color-text-secondary); margin-top: 6px; }
  .attach-remove { font-size: 13px; color: var(--color-text-tertiary); cursor: pointer; text-decoration: underline; }

  .submit-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
  .cancel-btn { padding: 0 20px; height: 38px; font-size: 15px; background: none; border: 0.5px solid var(--color-border-md); border-radius: var(--radius-md); cursor: pointer; color: var(--color-text-secondary); font-family: var(--font); }
  .cancel-btn:hover { background: rgba(0,0,0,0.02); }
  .submit-btn { padding: 0 24px; height: 38px; font-size: 15px; font-weight: 500; background: #2273FF; color: #fff; border: none; border-radius: var(--radius-md); cursor: pointer; font-family: var(--font); }
  .submit-btn:hover { box-shadow: inset 0 0 0 9999px rgba(0,0,0,0.06); }
  .submit-btn:active { transform: scale(0.98); }

  .hotel-section-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 22px; cursor: pointer; user-select: none; }
  .hotel-section-header:hover { background: rgba(0,0,0,0.02); }
  .hotel-section-title { font-size: 16px; font-weight: 500; display: flex; align-items: center; gap: 7px; }
  .hotel-toggle { font-size: 14px; color: var(--color-text-tertiary); }
  .hotel-tabs { display: flex; border-top: 0.5px solid var(--color-border); border-bottom: 0.5px solid var(--color-border); }
  .hotel-tab { flex: 1; padding: 9px 8px; font-size: 15px; cursor: pointer; border: none; background: none; color: var(--color-text-secondary); border-bottom: 2px solid transparent; font-family: var(--font); transition: color 0.12s; }
  .hotel-tab:hover { color: var(--color-text-primary); background: rgba(0,0,0,0.02); }
  .hotel-tab.active { color: #1D9E75; border-bottom-color: #1D9E75; font-weight: 500; background: var(--color-bg-secondary); }
  .hotel-body { padding: 14px 22px; }
  .hotel-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; border: 0.5px solid var(--color-border); border-radius: var(--radius-md); margin-bottom: 8px; background: var(--color-bg); }
  .hotel-item-info { flex: 1; min-width: 0; }
  .hotel-item-name { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
  .hotel-item-address { font-size: 14px; color: #6b6b6b; margin-top: 2px; }
  .hotel-item-dates { font-size: 14px; color: #6b6b6b; margin-top: 3px; }
  .hotel-item-actions { display: flex; gap: 2px; flex-shrink: 0; padding-top: 1px; }
  .hotel-empty { text-align: center; padding: 14px; color: var(--color-text-tertiary); font-size: 15px; }
  .hotel-picker { background: var(--color-bg-secondary); border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 14px; border: 0.5px solid var(--color-border); }
  .hotel-picker-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 8px; font-weight: 500; }
  .hotel-pick-list { display: flex; gap: 6px; flex-wrap: wrap; }
  .hotel-pick-card { border: 0.5px solid var(--color-border-md); border-radius: var(--radius-md); padding: 7px 10px; cursor: pointer; background: var(--color-bg); transition: all 0.12s; }
  .hotel-pick-card:hover { background: rgba(0,0,0,0.02); }
  .hotel-pick-card.selected { border-color: #1D9E75; background: #E1F5EE; }
  .top-tab-bar { display: flex; gap: 20px; margin-bottom: 1.5rem; }
  .top-tab-btn { padding: 0; font-size: 26px; font-weight: 700; letter-spacing: -0.03em; cursor: pointer; border: none; background: none; color: rgba(0,0,0,0.3); font-family: var(--font); transition: color 0.15s; line-height: 1.2; }
  .top-tab-btn::after { content: ''; display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-left: 5px; vertical-align: text-top; margin-top: 4px; opacity: 0; }
  .top-tab-btn.active { color: #2273FF; }
  .top-tab-btn.active::after { background: #2273FF; opacity: 1; }
  .top-tab-btn:hover:not(.active) { color: rgba(0,0,0,0.5); }

  .hcity-btn { border: none; border-radius: 20px; padding: 5px 13px; font-size: 14px; cursor: pointer; background: rgba(0,0,0,0.04); color: var(--color-text-secondary); font-family: var(--font); transition: all 0.12s; }
  .hcity-btn.sel-istanbul  { border-color: #2273FF; background: #7F77DD; color: #fff; font-weight: 500; }
  .hcity-btn.sel-cappadocia { border-color: #712B13; background: #D85A30; color: #fff; font-weight: 500; }
  .hcity-btn.sel-antalya  { border-color: #085041; background: #1D9E75; color: #fff; font-weight: 500; }

  .wishlist-date-picker { background: var(--color-bg-secondary); border-radius: var(--radius-md); padding: 12px 14px; border: 0.5px solid var(--color-border); margin-top: 6px; }
  .trip-date-btn { border: 0.5px solid var(--color-border-md); border-radius: var(--radius-md); padding: 6px 10px; cursor: pointer; background: var(--color-bg); font-family: var(--font); text-align: center; min-width: 52px; }
  .trip-date-btn:hover { background: rgba(0,0,0,0.02); }
  .wishlist-add-btn { padding: 6px 12px; font-size: 13px; color: #2273FF; background: #F1F6FB; border: none; border-radius: var(--radius-md); cursor: pointer; font-family: var(--font); font-weight: 500; white-space: nowrap; }
  .wishlist-add-btn.active { background: #2273FF; color: #fff; }
  .wishlist-add-btn.added { color: var(--color-text-tertiary); background: rgba(0,0,0,0.05); }
  button:hover { box-shadow: inset 0 0 0 9999px rgba(0,0,0,0.02); }
  .todo-tab-bar { display: flex; gap: 8px; margin-bottom: 14px; }
  .todo-tab-chip { padding: 5px 14px; font-size: 13px; font-weight: 500; border-radius: 20px; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .todo-tab-chip.active { background: #2e2e2e; color: #fff; border: 1.5px solid transparent; }
  .todo-tab-chip.inactive { background: none; color: #2e2e2e; border: 1.5px solid rgba(46,46,46,0.3); }
  .top-tab-btn .tab-emoji { opacity: 0.3; transition: opacity 0.15s; }
  .top-tab-btn.active .tab-emoji { opacity: 1; }
</style>
</head>
<body>
<div id="loading-screen"><div class="spin"></div>데이터 불러오는 중…</div>
<div class="container">
  <div id="firebase-error"></div>
  <div class="page-header">
    <span class="page-icon">🇹🇷</span>
    <h1 class="page-title">튀르키예 여행 <span id="dday-display"></span></h1>
  </div>

  <div class="top-tab-bar">
    <button class="top-tab-btn active" id="tab-btn-schedule" onclick="switchTab('schedule')"><span class="tab-emoji">📅</span> 일정</button>
    <button class="top-tab-btn" id="tab-btn-archiving" onclick="switchTab('archiving')"><span class="tab-emoji">📂</span> 아카이빙</button>
  </div>
  <div id="tab-panel-schedule">
    <div id="schedule-root"></div>
    <div id="settlement-root"></div>
  </div>
  <div id="tab-panel-archiving" style="display:none">
    <div id="todo-root"></div>
    <div id="wishlist-root"></div>
    <div id="hotel-root"></div>
    <div id="flight-root"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

const DAYS=['일','월','화','수','목','금','토'];
const SCHEDULE={
  '2026-09-10':{city:'이스탄불',note:'인천 출발 ✈'},

function renderCal(){
  const root=document.getElementById('cal-root');
  if(!root)return;
  const ws=getWeekStart(currentWeek);
  const weeks=['1주차 (9/7–13)','2주차 (9/14–20)','3주차 (9/21–27)'];
  let h=`<div class="week-header">
    <div class="week-title">2026년 9월 <span style="color:var(--color-text-secondary);font-weight:400;font-size:15px;">${weeks[currentWeek]}</span></div>
    <div class="week-nav">
      <button onclick="changeWeek(-1)"${currentWeek===0?' disabled':''}><i class="ti ti-chevron-left"></i></button>
      <button onclick="changeWeek(1)"${currentWeek===2?' disabled':''}><i class="ti ti-chevron-right"></i></button>
    </div>
  </div><div class="cal-week">`;
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const key=dateKey(d);
    const sch=SCHEDULE[key];
    const tripStart=new Date(2026,8,10),tripEnd=new Date(2026,8,23);
    const inRange=d>=tripStart&&d<=tripEnd;
    const isActive=selectedDate===key;
    const pill=sch?CITY_PILL[sch.city]:'';
    const toPill=sch&&sch.toCity?CITY_PILL[sch.toCity]:'';
    h+=`<div class="day-cell${isActive?' active':''}${!inRange?' other-month':''}" onclick="${inRange?`selectDay('${key}')`:''}">
      <div class="day-dow">${DAYS[d.getDay()]}</div>
      <div class="day-num">${d.getDate()}</div>
      ${sch?`<span class="city-pill ${pill}">${sch.city}</span>${sch.toCity?`<br><span class="city-pill ${toPill}" style="margin-top:2px;">${sch.toCity}</span>`:''}`:''}
    </div>`;
  }
  h+='</div>';
  root.innerHTML=h;
}

function syncFormInputs(){
  if(!formState)return;
  const t=document.getElementById('inp-title'); if(t) formState.title=t.value;
  const de=document.getElementById('inp-desc'); if(de) formState.desc=de.value;
  const u=document.getElementById('inp-map-url'); if(u) formState.mapUrl=u.value;
  const c=document.getElementById('inp-cost'); if(c) formState.cost=c.value;
}
function setTag(key){ syncFormInputs(); if(!formState)formState=freshForm(); formState.tag=formState.tag===key?null:key; renderDetail(); }
function toggleOpt(mode){ syncFormInputs(); if(!formState)formState=freshForm(); formState.optMode=formState.optMode===mode?null:mode; renderDetail(); }
function setPdf(e){ const f=e.target.files[0]; if(!f)return; if(!formState)formState=freshForm(); const r=new FileReader(); r.onload=ev=>{formState.pdfFile=f.name;formState.pdfData=ev.target.result;renderDetail();}; r.readAsDataURL(f); }
function removePdf(){ if(formState){formState.pdfFile=null;formState.pdfData=null;} renderDetail(); }
function openAddForm(){ formState=freshForm(); renderDetail(); }
function cancelForm(){ formState=null; renderDetail(); }
function startEdit(idx){
  const t=tasks[selectedDate][idx];
  formState={mode:'edit',editIdx:idx,tag:t.tag||null,title:t.name,desc:t.desc||'',cost:t.cost||'',optMode:t.mapUrl?'map':t.pdf?'pdf':null,mapUrl:t.mapUrl||'',pdfFile:t.pdf||null,pdfData:t.pdfData||null,selectedHotelIdx:null,selectedFlightIdx:null};
  renderDetail();
}
function submitForm(){
  syncFormInputs();
  const f=formState;
  if(!f||!f.title||!f.title.trim())return;
  const item={name:f.title.trim(),tag:f.tag||null};
  if(f.desc&&f.desc.trim()) item.desc=f.desc.trim();
  const cost=parseCost(f.cost); if(cost!==null) item.cost=cost;
  if(f.optMode==='map'&&f.mapUrl) item.mapUrl=f.mapUrl;
  if(f.optMode==='pdf'&&f.pdfFile){item.pdf=f.pdfFile;if(f.pdfData)item.pdfData=f.pdfData;}
  if(!tasks[selectedDate]) tasks[selectedDate]=[];
  if(f.mode==='edit'&&f.editIdx!=null){ tasks[selectedDate][f.editIdx]=item; }
  else { tasks[selectedDate].push(item); }
  formState=null;
  saveTasks();
  renderCal(); renderDetail(); renderSettlementSection();
}
function deleteTask(idx){
  tasks[selectedDate].splice(idx,1);
  if(formState&&formState.mode==='edit'&&formState.editIdx===idx) formState=null;
  saveTasks(); renderCal(); renderDetail();
}
function selectDay(key){ selectedDate=key; formState=null; renderCal(); renderDetail(); }
function changeWeek(dir){ currentWeek=Math.max(0,Math.min(2,currentWeek+dir)); renderCal(); }
function onDragStart(e,idx){ dragSrc=idx; setTimeout(()=>e.target.classList.add('dragging'),0); }
function onDragOver(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragEnd(){ document.querySelectorAll('.task-item').forEach(el=>el.classList.remove('dragging','drag-over')); }
function onDrop(e,idx){
  e.preventDefault();
  if(dragSrc===null||dragSrc===idx)return;
  const arr=tasks[selectedDate];
  const moved=arr.splice(dragSrc,1)[0];
  arr.splice(idx,0,moved);
  dragSrc=null;
  saveTasks(); renderCal(); renderDetail();
}

function openPdfData(dataUrl){
  if(!dataUrl)return;
  const parts=dataUrl.split(',');
  const mime=parts[0].split(':')[1].split(';')[0];
  const bytes=atob(parts[1]);
  const arr=new Uint8Array(bytes.length);
  for(let i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);
  window.open(URL.createObjectURL(new Blob([arr],{type:mime})),'_blank');
}

    <div style="background:#fff;border:0.5px solid var(--color-border);border-radius:var(--radius-md);padding:14px 16px;">
    <div class="form-section-title">${isEdit?'보석함 수정':'보석함 추가'}</div>
    <div class="field-label" style="margin-bottom:8px;">태그 <span class="field-opt">(선택)</span></div>
    <div class="tags-row">${tagBtns}</div>
    <div class="field-label">제목 <span class="field-required">*</span></div>
    <input type="text" id="w-title" placeholder="가보고 싶은 곳, 하고 싶은 것 💎" value="${escAttr(f.title||'')}" onkeydown="if(event.key==='Enter')submitWishlistForm()">
    <div class="field-label">설명 <span class="field-opt">(선택)</span></div>
    <textarea class="desc-textarea" id="w-desc" placeholder="메모를 남겨봐 ✍️">${esc(f.desc||'')}</textarea>
    <div class="field-label">지출 예상 <span class="field-opt">(선택)</span></div>
    <input type="text" id="w-cost" placeholder="예: 50000" value="${escAttr(f.cost||'')}" inputmode="numeric">
    <div class="field-label" style="margin-bottom:8px;">첨부 <span class="field-opt">(선택)</span></div>
    <div class="optional-row">
      <button class="opt-btn${f.optMode==='map'?' selected':''}" onclick="toggleWishlistOpt('map')"><i class="ti ti-map-pin" style="font-size:15px"></i>구글 맵 링크</button>
      <button class="opt-btn${f.optMode==='pdf'?' selected':''}" onclick="toggleWishlistOpt('pdf')"><i class="ti ti-file" style="font-size:15px"></i>PDF 첨부</button>
    </div>
    ${optFields}
    <div class="submit-row">
      <button class="cancel-btn" onclick="cancelWishlistForm()">취소</button>
      <button class="submit-btn" onclick="submitWishlistForm()">${isEdit?'수정 완료':'저장'}</button>
    </div>
    </div>
  </div>`;
}
function renderWishlistSection(){
  const root=document.getElementById('wishlist-root');if(!root)return;
  const TRIP_DATES=Object.keys(SCHEDULE).sort();
  let listHtml='';
  if(wishlist.length===0){
    listHtml=`<div class="todo-empty">가보고 싶은 곳을 담아봐 💎</div>`;
  } else {
    listHtml=wishlist.map((w,i)=>{
      const tag=getTag(w.tag);const tc=TAG_COLORS[tag.key];
      let extra='';
      if(w.desc)extra+=`<div class="task-desc-text">${esc(w.desc)}</div>`;
      if(w.mapUrl)extra+=`<a class="map-text" href="${escAttr(w.mapUrl)}" target="_blank">📍위치보기</a>`;
      if(w.cost!=null)extra+=`<div class="cost-text">💰 ${fmtCost(w.cost)}</div>`;
      let datePicker='';
      if(wishlistDatePick===i){
        const dateBtns=TRIP_DATES.map(dk=>{
          const d=new Date(dk+'T00:00:00');const sch=SCHEDULE[dk];
          return `<button class="trip-date-btn" onclick="addWishlistToDate(${i},'${dk}')"><div style="font-size:13px;font-weight:500;">9/${d.getDate()}</div>${sch?`<div style="font-size:11px;color:#6b6b6b;">${esc(sch.city.slice(0,3))}</div>`:''}</button>`;
        }).join('');
        datePicker=`<div class="wishlist-date-picker"><div style="font-size:13px;font-weight:500;margin-bottom:10px;color:#6b6b6b;">어느 날로 추가할까요?</div><div style="display:flex;flex-wrap:wrap;gap:6px;">${dateBtns}</div></div>`;
      }
      const addedInfo=findWishlistInTasks(w.name);
      const addBtnHtml=addedInfo
        ?`<button class="wishlist-add-btn added" onclick="removeWishlistFromSchedule(${i})"><i class="ti ti-check" style="font-size:13px;vertical-align:-1px;"></i> 추가됨</button>`
        :`<button class="wishlist-add-btn${wishlistDatePick===i?' active':''}" onclick="openWishlistDatePick(${i})"><i class="ti ti-calendar-plus" style="font-size:14px;vertical-align:-2px;"></i> 일정으로 추가</button>`;
      return `<div class="task-item" style="flex-direction:column;align-items:stretch;gap:0;padding-bottom:10px;">
        <div style="display:flex;align-items:flex-start;gap:10px;">
          <div style="flex:1;min-width:0;">
            <span class="task-tag-badge" style="background:${tc.bg};color:${tc.color};">${tag.emoji} ${tag.label}</span>
            <div class="task-name-text">${esc(w.name)}</div>
            ${extra}
          </div>
          <div class="task-actions">
            <button class="icon-btn edit" onclick="startWishlistEdit(${i})" title="수정"><i class="ti ti-edit"></i></button>
            <button class="icon-btn del" onclick="deleteWishlistItem(${i})" title="삭제"><i class="ti ti-trash"></i></button>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:8px;">${addBtnHtml}</div>
        ${addedInfo?'':datePicker}
      </div>`;
    }).join('');
  }
  const formHtml=wishlistFormState?buildWishlistForm(wishlistFormState):'';
  const bodyHtml=wishlistOpen?`<div class="hotel-body">
    ${listHtml}
    ${!wishlistFormState?`<button class="add-more-btn" style="margin-bottom:0;" onclick="openWishlistAdd()"><i class="ti ti-plus" style="font-size:14px;vertical-align:-2px"></i> 추가</button>`:''}
    ${formHtml}
  </div>`:'';
  root.innerHTML=`<div class="card" style="margin-bottom:1rem;">
    <div class="hotel-section-header" onclick="toggleWishlistSection()">
      <div class="hotel-section-title"><i class="ti ti-diamond" style="font-size:16px;color:#D4537E;vertical-align:-2px;"></i> 튈키 보석함</div>
      <i class="ti ${wishlistOpen?'ti-chevron-up':'ti-chevron-down'}" style="font-size:16px;color:var(--color-text-tertiary);"></i>
    </div>
    ${bodyHtml}
  </div>`;
}

function renderTodoSection(){
  const root=document.getElementById('todo-root');
  if(!root)return;
  const PERSON={yeseul:{label:'예슬',cls:'todo-person-yeseul'},jungho:{label:'정호',cls:'todo-person-jungho'}};
  const incomplete=todos.filter(t=>!t.done);
  const complete=todos.filter(t=>t.done);
  const displayItems=(todoSubTab==='todo'?incomplete:complete).map(t=>({t,origIdx:todos.indexOf(t)}));
  let formHtml='';
  if(todoFormState){
    const tf=todoFormState;
    const personBtns=Object.entries(PERSON).map(([k,v])=>
      `<button class="hcity-btn${tf.person===k?` sel-istanbul`:''}" style="${tf.person===k?'border-color:#2273FF;background:#7F77DD;color:#fff;font-weight:500;':''}" onclick="setTodoPerson('${k}')">${v.label}</button>`
    ).join('');
    formHtml=`<div style="border-top:0.5px solid var(--color-border);padding-top:12px;margin-top:4px;">
      <div class="form-section-title">${tf.mode==='edit'?'할 일 수정':'할 일 추가'}</div>
      <div class="field-label">할 일 <span class="field-required">*</span></div>
      <input type="text" id="todo-title" placeholder="예: 환전하기" value="${escAttr(tf.title||'')}">
      <div class="field-label" style="margin-bottom:8px;">담당 <span class="field-opt">(선택)</span></div>
      <div class="tags-row" style="margin-bottom:14px;">${personBtns}</div>
      <div class="submit-row">
        <button class="cancel-btn" onclick="cancelTodoForm()">취소</button>
        <button class="submit-btn" onclick="submitTodoForm()">${tf.mode==='edit'?'수정 완료':'추가'}</button>
      </div>
    </div>`;
  }
  const emptyMsg=todoSubTab==='todo'?'할 일을 추가해보세요':'완료한 일이 없어요 ✓';
  const listHtml=displayItems.length===0
    ?`<div class="todo-empty">${emptyMsg}</div>`
    :displayItems.map(({t,origIdx})=>{
      const p=t.person?PERSON[t.person]:null;
      return `<div class="todo-item${t.done?' done':''}">
        <input class="todo-check" type="checkbox" ${t.done?'checked':''} onchange="toggleTodoDone(${origIdx})">
        <span class="todo-title">${esc(t.title)}</span>
        ${p?`<span class="todo-person-tag ${p.cls}">${p.label}</span>`:''}
        <div style="display:flex;gap:2px;flex-shrink:0;">
          <button class="icon-btn edit" onclick="startTodoEdit(${origIdx})" title="수정"><i class="ti ti-edit"></i></button>
          <button class="icon-btn del" onclick="deleteTodo(${origIdx})" title="삭제"><i class="ti ti-trash"></i></button>
        </div>
      </div>`;
    }).join('');
  const chipBar=`<div class="todo-tab-bar">
    <button class="todo-tab-chip ${todoSubTab==='todo'?'active':'inactive'}" onclick="switchTodoSubTab('todo')">할 일</button>
    <button class="todo-tab-chip ${todoSubTab==='done'?'active':'inactive'}" onclick="switchTodoSubTab('done')">완료한 일</button>
  </div>`;
  root.innerHTML=`<div class="card" style="margin-bottom:0.7rem;">
    <div class="hotel-section-header" style="cursor:default;">
      <div class="hotel-section-title"><i class="ti ti-checklist" style="font-size:16px;color:#2273FF;vertical-align:-2px;"></i> 할 일</div>
    </div>
    <div class="hotel-body">
      ${chipBar}
      ${listHtml}
      ${todoSubTab==='todo'&&!todoFormState?`<button class="add-more-btn" style="margin-bottom:0;margin-top:8px;" onclick="openTodoAdd()"><i class="ti ti-plus" style="font-size:14px;vertical-align:-2px"></i> 할 일 추가</button>`:''}
      ${todoSubTab==='todo'?formHtml:''}
    </div>
  </div>`;
}
function switchTodoSubTab(tab){todoSubTab=tab;renderTodoSection();}
function toggleTodoSection(){todoOpen=!todoOpen;renderTodoSection();}
function openTodoAdd(){syncTodoForm();todoFormState={mode:'add',title:'',person:null};renderTodoSection();}
function cancelTodoForm(){todoFormState=null;renderTodoSection();}
function syncTodoForm(){if(!todoFormState)return;const el=document.getElementById('todo-title');if(el)todoFormState.title=el.value;}
function setTodoPerson(k){syncTodoForm();if(!todoFormState)return;todoFormState.person=todoFormState.person===k?null:k;renderTodoSection();}
function startTodoEdit(idx){const t=todos[idx];if(!t)return;todoFormState={mode:'edit',editIdx:idx,title:t.title,person:t.person||null};renderTodoSection();}
function submitTodoForm(){
  syncTodoForm();const tf=todoFormState;if(!tf||!tf.title.trim())return;
  const item={title:tf.title.trim(),person:tf.person||null,done:false};
  if(tf.mode==='edit'&&tf.editIdx!=null){item.done=todos[tf.editIdx].done;todos[tf.editIdx]=item;}
  else{todos.push(item);}
  todoFormState=null;saveTodos();renderTodoSection();
}
function toggleTodoDone(idx){if(!todos[idx])return;todos[idx].done=!todos[idx].done;saveTodos();renderTodoSection();}
function deleteTodo(idx){todos.splice(idx,1);saveTodos();renderTodoSection();}

function renderSettlementSection(){
  const root=document.getElementById('settlement-root');
  if(!root)return;
  const items=[];
  vouchers.flight.forEach((v,i)=>{if(v.cost!=null)items.push({key:`f-${i}`,label:`${v.from||'?'} → ${v.to||'?'}`,tagLabel:'이동편',tagBg:'#E6F1FB',tagColor:'#0C447C',cost:v.cost});});
  hotels.forEach((h,i)=>{if(h.cost!=null)items.push({key:`h-${i}`,label:h.name,tagLabel:'숙소',tagBg:'#E1F5EE',tagColor:'#085041',cost:h.cost});});
  Object.keys(tasks).sort().forEach(date=>{
    (tasks[date]||[]).forEach((t,i)=>{
      if(t.cost!=null){
        const tag=getTag(t.tag);const tc=TAG_COLORS[tag.key];
        items.push({key:`t-${date}-${i}`,label:t.name,tagLabel:`${tag.emoji} ${tag.label}`,tagBg:tc.bg,tagColor:tc.color,cost:t.cost});
      }
    });
  });
  let total=0;
  const listHtml=items.length===0
    ?`<div class="settlement-empty">지출 내역이 없어요</div>`
    :items.map((it,idx)=>{
      const s=_ss(it.key);
      const dispCost=s.split?Math.round(it.cost/2):it.cost;
      if(s.checked) total+=dispCost;
      return `<div class="settlement-item${s.checked?'':' unchecked'}${idx===items.length-1?' last':''}">
        <input class="settlement-check" type="checkbox" ${s.checked?'checked':''} onchange="toggleSettlementCheck('${it.key}')">
        <div class="settlement-label">
          <span style="font-size:11px;font-weight:600;color:${it.tagColor};background:${it.tagBg};border-radius:4px;padding:3px 8px;margin-right:6px;">${it.tagLabel}</span>${esc(it.label)}
        </div>
        <button class="settlement-split-btn${s.split?' on':''}" onclick="toggleSettlementSplit('${it.key}')">÷2</button>
        <div class="settlement-cost">💰 ${fmtCost(dispCost)}${s.split?`<div style="font-size:10px;color:var(--color-text-tertiary);font-weight:400;">(${fmtCost(it.cost)})</div>`:''}</div>
      </div>`;
    }).join('')
    +`<div class="settlement-total"><span class="settlement-total-label">총 지출</span><span class="settlement-total-amount">💰 ${fmtCost(total)}</span></div>`;
  root.innerHTML=`<div class="card" style="margin-bottom:0.7rem;">
    <div class="hotel-section-header" onclick="toggleSettlementSection()">
      <div class="hotel-section-title"><i class="ti ti-receipt" style="font-size:16px;color:#993C1D;vertical-align:-2px;"></i> 미니 정산기</div>
      <i class="ti ${settlementOpen?'ti-chevron-up':'ti-chevron-down'}" style="font-size:16px;color:var(--color-text-tertiary);"></i>
    </div>
    ${settlementOpen?`<div class="hotel-body">${listHtml}</div>`:''}
  </div>`;
}
function toggleSettlementSection(){settlementOpen=!settlementOpen;renderSettlementSection();}

// Firebase 실시간 리스너 설정
const _ready={tasks:false,hotels:false,flights:false,todos:false,wishlist:false};
function selectNearestDate(){
  const today=dateKey(new Date());
  const schedDates=Object.keys(SCHEDULE).sort();
  const nearest=schedDates.find(d=>d>=today)||schedDates[schedDates.length-1];
  selectedDate=nearest;
  const target=new Date(nearest+'T00:00:00');
  for(let w=0;w<3;w++){
    const ws=getWeekStart(w);
    const we=new Date(ws);we.setDate(ws.getDate()+6);
    if(target>=ws&&target<=we){currentWeek=w;break;}
  }
}

function _checkReady(){
  if(Object.values(_ready).every(v=>v)){
    document.getElementById('loading-screen').style.display='none';
    selectNearestDate();
    renderSettlementSection();
    renderTodoSection();
    renderWishlistSection();
    renderHotelSection();
    renderVoucherSection('flight');
    renderScheduleSection();
  }
}

onValue(dbRef('tasks'), snap=>{
  const val=snap.val();
  tasks=(val && typeof val==='object') ? val : {};
  if(!_ready.tasks){_ready.tasks=true;_checkReady();}
  else if(_remoteSkip.tasks){_remoteSkip.tasks=false;}
  else{renderCal();renderDetail();renderSettlementSection();}
});

onValue(dbRef('hotels'), snap=>{
  hotels=fbArr(snap.val());
  if(!_ready.hotels){_ready.hotels=true;_checkReady();}
  else if(_remoteSkip.hotels){_remoteSkip.hotels=false;}
  else{renderHotelSection();renderSettlementSection();}
});

onValue(dbRef('flights'), snap=>{
  vouchers.flight=fbArr(snap.val());
  if(!_ready.flights){_ready.flights=true;_checkReady();}
  else if(_remoteSkip.flights){_remoteSkip.flights=false;}
  else{renderVoucherSection('flight');renderSettlementSection();}
});

onValue(dbRef('todos'), snap=>{
  todos=fbArr(snap.val());
  if(!_ready.todos){_ready.todos=true;_checkReady();}
  else if(_remoteSkip.todos){_remoteSkip.todos=false;}
  else{renderTodoSection();}
});

onValue(dbRef('wishlist'), snap=>{
  wishlist=fbArr(snap.val());
  if(!_ready.wishlist){_ready.wishlist=true;_checkReady();}
  else if(_remoteSkip.wishlist){_remoteSkip.wishlist=false;}
  else{renderWishlistSection();}
});

// 8초 후에도 로딩 중이면 오류 표시
setTimeout(()=>{
  if(!Object.values(_ready).every(v=>v)){
    document.getElementById('loading-screen').style.display='none';
    showError('Firebase에 연결할 수 없어요. Realtime Database 규칙(Rules)에서 읽기/쓰기가 허용되어 있는지 확인해주세요.');
    renderSettlementSection();renderTodoSection();renderWishlistSection();renderHotelSection();renderVoucherSection('flight');renderScheduleSection();
  }
},8000);

// D-day 계산
(function(){
  const trip=new Date(2026,8,10);
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.round((trip-today)/(1000*60*60*24));
  const el=document.getElementById('dday-display');
  if(!el)return;
  if(diff>0){
    el.className='before';el.textContent=`D-${diff}`;
  } else if(diff===0){
    el.className='ongoing';el.textContent=`D-Day!`;
  } else {
    el.className='after';el.textContent=`D+${Math.abs(diff)}`;
  }
})();

// inline onclick 핸들러들을 window에 노출
Object.assign(window,{
  changeWeek, selectDay, openAddForm, setTag, toggleOpt, syncFormInputs,
  setPdf, removePdf, openPdfData, cancelForm, submitForm, startEdit, deleteTask, openTaskPdf,
  onDragStart, onDragOver, onDrop, onDragEnd,
  toggleHotelSection, openHotelAdd, startHotelEdit, deleteHotel,
  setHotelCity, syncHotelFormInputs, submitHotelForm, cancelHotelForm, selectHotelPreset, selectFlightPreset,
  toggleVoucherSection, openVoucherAdd, startVoucherEdit, deleteVoucher,
  setVoucherPdf, removeVoucherPdf, submitVoucherForm, cancelVoucherForm, openVoucherPdf,
  toggleSettlementSection, toggleSettlementCheck, toggleSettlementSplit,
  toggleTodoSection, openTodoAdd, cancelTodoForm, syncTodoForm, setTodoPerson,
  startTodoEdit, submitTodoForm, toggleTodoDone, deleteTodo, switchTodoSubTab,
  toggleWishlistSection, openWishlistAdd, cancelWishlistForm, syncWishlistFormInputs,
  setWishlistTag, toggleWishlistOpt, setWishlistPdf, removeWishlistPdf,
  selectWishlistHotelPreset, selectWishlistFlightPreset,
  startWishlistEdit, submitWishlistForm, deleteWishlistItem,
  openWishlistDatePick, addWishlistToDate,
  findWishlistInTasks, removeWishlistFromSchedule,
  switchTab,
});
</script>
